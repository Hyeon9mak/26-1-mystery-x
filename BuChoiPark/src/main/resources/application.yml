spring:
  datasource:
    url: jdbc:sqlite:/app/data/buchoipark.db
    driver-class-name: org.sqlite.JDBC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG
