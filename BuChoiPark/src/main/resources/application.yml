spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${SQLITE_DB_PATH:./data/livid.db}
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
  sql:
    init:
      mode: always

app:
  storage:
    dir: ${APP_STORAGE_DIR:./data/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
